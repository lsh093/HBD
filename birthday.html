/* ── CONFETTI ─────────────────────────────────────────────────── */
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
const resize = () => { canvas.width = innerWidth; canvas.height = innerHeight; };
resize(); window.addEventListener('resize', resize);
const COLORS = ['#fb7185','#f9a8d4','#fbbf24','#a78bfa','#34d399','#60a5fa','#f472b6'];
const pieces = Array.from({length:120}, () => ({
  x: Math.random()*innerWidth, y: Math.random()*innerHeight - innerHeight,
  r: Math.random()*6+3, color: COLORS[Math.floor(Math.random()*COLORS.length)],
  tiltAngle: 0, tiltSpeed: Math.random()*.1+.05,
  speed: Math.random()*2+1, drift: Math.random()*1-.5,
  shape: Math.random()>.5?'rect':'circle',
}));
(function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces.forEach(p => {
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.tiltAngle);
    ctx.fillStyle=p.color; ctx.globalAlpha=.85;
    if(p.shape==='rect') ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
    else { ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
    p.y+=p.speed; p.x+=p.drift; p.tiltAngle+=p.tiltSpeed;
    if(p.y>canvas.height){ p.y=-10; p.x=Math.random()*canvas.width; }
  });
  requestAnimationFrame(draw);
})();

/* ── FLOATING HEARTS ─────────────────────────────────────────── */

/* ── CAROUSEL ─────────────────────────────────────────────────── */
const track  = document.getElementById('track');
const dotsEl = document.getElementById('dots');
const total  = CONFIG.slides.length;
let cur = 0;
CONFIG.slides.forEach((_,i) => {
  const d = document.createElement('div');
  d.className='dot'+(i===0?' active':'');
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
});
function goTo(n){
  cur=(n+total)%total;
  track.style.transform=`translateX(-${cur*100}%)`;
  dotsEl.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));
}
let autoTimer = null;
function startAuto(){ autoTimer = setInterval(()=>goTo(cur+1), 4500); }
function resetAuto(){ clearInterval(autoTimer); startAuto(); }

document.getElementById('prevBtn').onclick = () => { goTo(cur-1); resetAuto(); };
document.getElementById('nextBtn').onclick = () => { goTo(cur+1); resetAuto(); };
let tx=0, ty=0, isDragging=false;
const carousel = document.querySelector('.carousel');
carousel.addEventListener('touchstart', e=>{
  tx=e.touches[0].clientX;
  ty=e.touches[0].clientY;
  isDragging=false;
},{passive:true});
carousel.addEventListener('touchmove', e=>{
  const dx=e.touches[0].clientX-tx;
  const dy=e.touches[0].clientY-ty;
  if(!isDragging && Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>8){
    isDragging=true;
  }
  if(isDragging) e.preventDefault();
},{passive:false});
carousel.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>40){
    goTo(dx<0?cur+1:cur-1);
    resetAuto();
  }
});

/* ── SCROLL REVEAL (내부 요소) ─────────────────────────────────── */
const io = new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);} });
},{threshold:.15});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

/* ── 섹션 등장 애니메이션 ──────────────────────────────────────── */
const sectionIO = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      // 클래스 제거 후 다시 추가해야 animation이 재생됨
      e.target.classList.remove('section-visible');
      void e.target.offsetWidth; // reflow 강제
      e.target.classList.add('section-visible');
      e.target.querySelectorAll('.reveal').forEach(el=>{
        el.classList.remove('visible');
        void el.offsetWidth;
        el.classList.add('visible');
      });
    }
  });
},{threshold:0.1});
document.querySelectorAll('#timeline,#letter-section,#gift-section,#comment-section')
  .forEach(s=>sectionIO.observe(s));

// 댓글 불러오기
function loadComments() {
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  commentList.innerHTML = data.length
    ? data.map((c, i) => renderCard(c, i)).join('')
    : '<p class="no-comment">아직 댓글이 없어요. 첫 번째로 남겨봐요! 🎉</p>';
}

function renderCard(c, idx) {
  return `<div class="comment-card">
    <button class="comment-delete" onclick="deleteComment(${idx})" title="삭제">✕</button>
    <div class="comment-avatar">${c.emoji}</div>
    <div class="comment-body">
      <div class="comment-meta">
        <span class="comment-author">${c.name}</span>
        <span class="comment-time">${c.time}</span>
      </div>
      <div class="comment-msg">${c.msg}</div>
    </div>
  </div>`;
}

function deleteComment(idx) {
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  data.splice(idx, 1);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  loadComments();
}

function formatTime() {
  const d = new Date();
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// 댓글 등록
document.getElementById('commentSubmit').onclick = () => {
  const name = commentName.value.trim() || '익명';
  const msg  = commentText.value.trim();
  if (!msg) { commentText.focus(); return; }

  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  data.unshift({ emoji: selectedEmoji, name, msg, time: formatTime() });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

  commentText.value = '';
  charCount.textContent = '0 / 200';
  loadComments();
};

loadComments();
